naftiko: 1.0.0-alpha2
info:
  label: Wallarm API — Triggers
  description: 'Wallarm API — Triggers. 2 operations. Lead operation: List Triggers. Self-contained Naftiko capability covering
    one Wallarm business surface.'
  tags:
  - Wallarm
  - Triggers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WALLARM_API_KEY: WALLARM_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallarm-triggers
    baseUri: https://us1.api.wallarm.com
    description: Wallarm API — Triggers business capability. Self-contained, no shared references.
    resources:
    - name: v1-objects-trigger
      path: /v1/objects/trigger
      operations:
      - name: listtriggers
        method: POST
        description: List Triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-objects-trigger-create
      path: /v1/objects/trigger/create
      operations:
      - name: createtrigger
        method: POST
        description: Create Trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-WallarmApi-Token
      value: '{{env.WALLARM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallarm-triggers-rest
    port: 8080
    description: REST adapter for Wallarm API — Triggers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/objects/trigger
      name: v1-objects-trigger
      description: REST surface for v1-objects-trigger.
      operations:
      - method: POST
        name: listtriggers
        description: List Triggers
        call: wallarm-triggers.listtriggers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/objects/trigger/create
      name: v1-objects-trigger-create
      description: REST surface for v1-objects-trigger-create.
      operations:
      - method: POST
        name: createtrigger
        description: Create Trigger
        call: wallarm-triggers.createtrigger
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallarm-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wallarm API — Triggers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-triggers
      description: List Triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: wallarm-triggers.listtriggers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-trigger
      description: Create Trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wallarm-triggers.createtrigger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
