naftiko: "1.0.0-alpha1"

info:
  label: "Wallarm API"
  description: >-
    Wallarm API provides programmatic access to the Wallarm API Security
    Platform for managing attacks, vulnerabilities, security rules, IP lists,
    filter nodes, integrations, and triggers.
  tags:
    - API Security
    - WAF
    - Vulnerability Management
    - Attack Detection
    - IP Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WALLARM_API_TOKEN: WALLARM_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: wallarm
      baseUri: https://us1.api.wallarm.com
      description: "Wallarm API Security Platform REST API"
      authentication:
        type: apikey
        key: X-WallarmApi-Token
        value: "{{WALLARM_API_TOKEN}}"
        placement: header
      resources:
        - name: user
          path: /v1/user
          description: User account management
          operations:
            - name: get-user
              method: POST
              description: Get user details and client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: attacks
          path: /v1/objects/attack
          description: Attack data retrieval
          operations:
            - name: list-attacks
              method: POST
              description: List detected attacks with filtering
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
                - name: limit
                  in: body
                  type: integer
                  required: false
                  description: Maximum results to return
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: attacks-paginated
          path: /v2/objects/attack
          description: Paginated attack data retrieval
          operations:
            - name: list-attacks-paginated
              method: POST
              description: List attacks with cursor-based pagination
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
                - name: cursor
                  in: body
                  type: string
                  required: false
                  description: Pagination cursor
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vulnerabilities
          path: /v1/objects/vuln
          description: Vulnerability management
          operations:
            - name: list-vulnerabilities
              method: POST
              description: List detected vulnerabilities
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
                - name: status
                  in: body
                  type: string
                  required: false
                  description: Filter by status (active, fixed, false_positive)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: rules
          path: /v1/objects/hint
          description: Security rules management
          operations:
            - name: list-rules
              method: POST
              description: List all security rules
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: create-rule
          path: /v1/objects/hint/create
          description: Create security rule
          operations:
            - name: create-rule
              method: POST
              description: Create a new security rule or virtual patch
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
                - name: type
                  in: body
                  type: string
                  required: true
                  description: Rule type (vpatch, regex, etc.)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  clientid: "{{tools.clientid}}"
                  type: "{{tools.type}}"

        - name: delete-rule
          path: /v1/objects/hint/delete
          description: Delete security rule
          operations:
            - name: delete-rule
              method: POST
              description: Delete a security rule by ID
              inputParameters:
                - name: id
                  in: body
                  type: integer
                  required: true
                  description: Rule ID to delete
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  clientid: "{{tools.clientid}}"

        - name: ip-rules
          path: /v4/ip_rules
          description: IP list management
          operations:
            - name: list-ip-rules
              method: GET
              description: List IP rules from allowlist, denylist, or graylist
              inputParameters:
                - name: clientid
                  in: query
                  type: integer
                  required: true
                  description: Client ID
                - name: list
                  in: query
                  type: string
                  required: false
                  description: Filter by list type (allowlist, denylist, graylist)
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Number of items to return
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-ip-rule
              method: POST
              description: Add an IP, subnet, country, or proxy to an IP list
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
                - name: rule_type
                  in: body
                  type: string
                  required: true
                  description: Rule type (ip_range, country, proxy_type)
                - name: pools
                  in: body
                  type: array
                  required: true
                  description: Target IP lists
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  clientid: "{{tools.clientid}}"
                  rule_type: "{{tools.rule_type}}"
                  pools: "{{tools.pools}}"
            - name: delete-ip-rule
              method: DELETE
              description: Remove an IP rule from an IP list
              inputParameters:
                - name: id
                  in: body
                  type: integer
                  required: true
                  description: IP rule ID to delete
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  clientid: "{{tools.clientid}}"

        - name: nodes
          path: /v1/objects/node
          description: Filter node management
          operations:
            - name: list-nodes
              method: POST
              description: List all Wallarm filter nodes
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: integrations
          path: /v1/objects/integration
          description: Third-party integration management
          operations:
            - name: list-integrations
              method: POST
              description: List configured third-party integrations
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: triggers
          path: /v1/objects/trigger
          description: Automated trigger management
          operations:
            - name: list-triggers
              method: POST
              description: List configured automated triggers
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications
          path: /v1/objects/application
          description: Application scope management
          operations:
            - name: list-applications
              method: POST
              description: List configured applications and scopes
              inputParameters:
                - name: clientid
                  in: body
                  type: integer
                  required: true
                  description: Client ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: wallarm-api
      resources:
        - path: /v1/user
          name: user
          operations:
            - method: POST
              name: get-user
              description: Get user details
              call: "wallarm.get-user"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/attacks
          name: attacks
          operations:
            - method: GET
              name: list-attacks
              description: List detected attacks
              call: "wallarm.list-attacks"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vulnerabilities
          name: vulnerabilities
          operations:
            - method: GET
              name: list-vulnerabilities
              description: List detected vulnerabilities
              call: "wallarm.list-vulnerabilities"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/rules
          name: rules
          operations:
            - method: GET
              name: list-rules
              description: List security rules
              call: "wallarm.list-rules"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ip-rules
          name: ip-rules
          operations:
            - method: GET
              name: list-ip-rules
              description: List IP rules
              call: "wallarm.list-ip-rules"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wallarm-api-mcp
      transport: http
      tools:
        - name: get-user
          description: Get current user details and client ID
          hints:
            readOnly: true
            openWorld: false
          call: "wallarm.get-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-attacks
          description: List detected security attacks
          hints:
            readOnly: true
            openWorld: true
          call: "wallarm.list-attacks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-vulnerabilities
          description: List detected vulnerabilities
          hints:
            readOnly: true
            openWorld: true
          call: "wallarm.list-vulnerabilities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-rules
          description: List configured security rules
          hints:
            readOnly: true
            openWorld: false
          call: "wallarm.list-rules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ip-rules
          description: List IP allowlist, denylist, and graylist entries
          hints:
            readOnly: true
            openWorld: false
          call: "wallarm.list-ip-rules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-ip-rule
          description: Add an IP address or subnet to an IP list
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wallarm.add-ip-rule"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-ip-rule
          description: Remove an IP rule from an IP list
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "wallarm.delete-ip-rule"
          outputParameters:
            - type: object
              mapping: "$."
