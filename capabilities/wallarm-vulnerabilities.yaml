naftiko: 1.0.0-alpha2
info:
  label: Wallarm API — Vulnerabilities
  description: 'Wallarm API — Vulnerabilities. 1 operations. Lead operation: List Vulnerabilities. Self-contained Naftiko
    capability covering one Wallarm business surface.'
  tags:
  - Wallarm
  - Vulnerabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WALLARM_API_KEY: WALLARM_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallarm-vulnerabilities
    baseUri: https://us1.api.wallarm.com
    description: Wallarm API — Vulnerabilities business capability. Self-contained, no shared references.
    resources:
    - name: v1-objects-vuln
      path: /v1/objects/vuln
      operations:
      - name: listvulnerabilities
        method: POST
        description: List Vulnerabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-WallarmApi-Token
      value: '{{env.WALLARM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallarm-vulnerabilities-rest
    port: 8080
    description: REST adapter for Wallarm API — Vulnerabilities. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/objects/vuln
      name: v1-objects-vuln
      description: REST surface for v1-objects-vuln.
      operations:
      - method: POST
        name: listvulnerabilities
        description: List Vulnerabilities
        call: wallarm-vulnerabilities.listvulnerabilities
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallarm-vulnerabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wallarm API — Vulnerabilities. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-vulnerabilities
      description: List Vulnerabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: wallarm-vulnerabilities.listvulnerabilities
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
