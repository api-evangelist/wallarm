naftiko: 1.0.0-alpha2
info:
  label: Wallarm API — Integrations
  description: 'Wallarm API — Integrations. 1 operations. Lead operation: List Integrations. Self-contained Naftiko capability
    covering one Wallarm business surface.'
  tags:
  - Wallarm
  - Integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WALLARM_API_KEY: WALLARM_API_KEY
capability:
  consumes:
  - type: http
    namespace: wallarm-integrations
    baseUri: https://us1.api.wallarm.com
    description: Wallarm API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: v1-objects-integration
      path: /v1/objects/integration
      operations:
      - name: listintegrations
        method: POST
        description: List Integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-WallarmApi-Token
      value: '{{env.WALLARM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: wallarm-integrations-rest
    port: 8080
    description: REST adapter for Wallarm API — Integrations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/objects/integration
      name: v1-objects-integration
      description: REST surface for v1-objects-integration.
      operations:
      - method: POST
        name: listintegrations
        description: List Integrations
        call: wallarm-integrations.listintegrations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wallarm-integrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wallarm API — Integrations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-integrations
      description: List Integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: wallarm-integrations.listintegrations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
