    description: >-
      The Wallarm API provides programmatic access to the Wallarm API Security Platform, enabling management of attacks,
      incidents, vulnerabilities, rules, IP lists, filter nodes, users, and integrations. The API is available on both
      the US Cloud (us1.api.wallarm.com) and EU Cloud (api.wallarm.com), and uses API token authentication via the
      X-WallarmApi-Token header.
