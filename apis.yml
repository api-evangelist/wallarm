description: >-
  Wallarm provides advanced API security and protection solutions for APIs, web applications, and microservices. The
  platform includes API discovery, real-time attack protection, vulnerability testing, and an open-source API Firewall
  that enforces OpenAPI specifications as a positive security model. Wallarm supports deployment on Kubernetes, cloud
  environments, and as an NGINX-based proxy.
